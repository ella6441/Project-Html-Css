        <form action="form2.html" target="_blank">
            <div class="data">
                <h1>   תאם חבילה:</h1>
            </div>
            <div class="data1">
               <label for="contree" >אנא בחר את שם המדינה שברצונך לנפוש בה:</label>
                <select class="design1" name="contree">
                  <option value="val1">צרפת</option>
                  <option value="val2">שוייץ</option>
                  <option value="val3">איטליה</option>
                </select>
            </div>
            <div class="data2">
              <label for="house" >אנא בחר את קוד הדירה שכבשה את לבך:</label>
              <input class="design1" name="f_house" id="house" type="number" placeholder="1"> 
            </div>
            <div class="data3">
              <label for="at" >האם אתה מעוניין באטרקציה מיוחדת?</label>
             <div> <input name="f_at" id="action" value="1"type="radio">כן</div>

              <input class="design2"  name="f_sdate" id="sdate" type="date">
            </div>
            <div class="data4">
              <label for="edate">תאריך סיום החופשה שלך:</label>
              <input class="design2" name="f_edate" id="edate" type="date">
            </div>
            <div class="data5">
              <label for="child">מס' הנפשות:</label>
              <input class="design2"  name="f_child" id="child" type="number">
            </div>
            <div class="data6">
              <label for="note">בקשות מיוחדות:</label>
              <textarea class="size"  name="f_note" id="note"></textarea>
            </div>
            <div class="button">
              <button value="rsdata" id="reset">נקה</button>
              <button value="sbdata" type="submit">המשך</button>
            </div>

        </div>
